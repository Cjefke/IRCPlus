# Very short eggdrop.conf v1.0 by Cjefke
# Make a directory in your eggdrop dir: data (There comes all your userfile/pidfile/notesfiles/channelfiles etc.)
# Be sure to still edit things to you need!!
# Must work with latest eggdrop versions (1.10+)
# Https://IRCPlus.nl - irc.IRCPlus.nl

#! /home/eggdrop/eggdrop
set username "bot"
set admin "Lamer"
set network "Global-Irc"
set timezone "CET"
set offset "-1"
set prefer-ipv6 0
set max-logs 20
set max-logsize 0
set raw-log 0
logfile mco * "logs/eggdrop.log"
set log-time 1
set timestamp-format {[%H:%M:%S]}
set keep-all-logs 0
set logfile-suffix ".%d%b%Y"
set switch-logfiles-at 300
set quiet-save 0
set console "mkcoblxs"
set userfile "data/bot.user"
set pidfile "data/bot.pid"
set help-path "help/"
set text-path "text/"
set motd "text/motd"
set telnet-banner "text/banner"
set userfile-perm 0600
listen 3333 all
set remote-boots 2
set share-unlinks 1
set protect-telnet 0
set dcc-sanitycheck 0
set ident-timeout 5
set require-p 1
set open-telnets 0
set stealth-telnets 0
set use-telnet-banner 0
set connect-timeout 15
set dcc-flood-thr 3
set telnet-flood 5:1
set paranoid-telnet-flood 1
set ssl-capath "/etc/ssl/"
set ssl-ciphers "ALL"
set ssl-certificate "eggdrop.crt"
set ssl-privatekey "eggdrop.key"
set ssl-cert-auth 0
set ignore-time 15
set hourly-updates 00
set owner "Lamer"
set notify-newusers "$owner"
set default-flags "hp"
set whois-fields "url birthday"
set must-be-owner 1
unbind dcc n simul *dcc:simul
set max-socks 100
set allow-dk-cmds 1
set dupwait-timeout 5
set cidr-support 0
set show-uname 1
set mod-path "modules/"
loadmodule pbkdf2
set pbkdf2-method "SHA256"
loadmodule blowfish
set blowfish-use-mode cbc
loadmodule python
loadmodule channels
set chanfile "data/bot.chan"
set force-expire 0
set share-greet 0
set use-info 1
set allow-ps 0

set default-flood-chan 15:6
set default-flood-deop 3:1
set default-flood-kick 3:1
set default-flood-join 5:6
set default-flood-ctcp 3:6
set default-flood-nick 5:6
set default-aop-delay 5:3
set default-idle-kick 0
set default-chanmode "nt"
set default-stopnethack-mode 0
set default-revenge-mode 0
set default-ban-type 3
set default-ban-time 120
set default-exempt-time 60
set default-invite-time 60

set default-chanset {
        +autoop         +autovoice
        -bitch          +cycle
        +dontkickops    +dynamicbans
        +dynamicexempts +dynamicinvites
        -enforcebans    +greet
        -inactive       +nodesynch
        -protectfriends +protectops
        -revenge        -revengebot
        -secret         +seen
        +shared         -statuslog
        +userbans       +userexempts
        +userinvites    -protecthalfops
        +autohalfop     -static
}

channel add #Eggdrop

loadmodule server
set net-type "Other"
set nick "B?t"
set altnick "B?t"
set realname "IRCPlus.nl Eggdrop"

bind evnt - init-server evnt:init_server

proc evnt:init_server {type} {
  global botnick
  putquick "MODE $botnick +iBp-ws"
}

set default-port 6667
server add irc.IRCPlus.nl +6697
set sasl-continue 1
set account-notify 1
set extended-join 1
set msg-rate 2
set keep-nick 1
set quiet-reject 1
set lowercase-ctcp 0
set answer-ctcp 3
set flood-msg 5:60
set flood-ctcp 3:60
set server-cycle-wait 60
set server-timeout 60
set check-stoned 1
set serverror-quit 1
set max-queue-msg 300
set trigger-on-ignore 0
set exclusive-binds 0
set double-mode 1
set double-server 1
set double-help 1
set optimize-kicks 1
set stack-limit 4
loadmodule ctcp
set ctcp-mode 0
set ctcp-version "IRCPlus.nl Eggdrop"
loadmodule irc
set bounce-bans 0
set bounce-exempts 0
set bounce-invites 0
set bounce-modes 0
set learn-users 0
set wait-split 600
set wait-info 180
set mode-buf-length 200
unbind msg - ident *msg:ident
unbind msg - addhost *msg:addhost
bind msg - auth *msg:ident
bind msg - +host *msg:addhost
set opchars "@&~"
set no-chanrec-info 0
set prevent-mixing 1
loadmodule compress
set share-compressed 1
loadmodule notes
set notefile "data/bot.notes"
set max-notes 50
set note-life 60
set allow-fwd 0
set notify-users 0
set notify-onjoin 1
loadmodule console
set console-autosave 1
set force-channel 0
set info-party 0
loadmodule seen
loadmodule uptime
source scripts/autoscripts.tcl
source scripts/alltools.tcl
source scripts/action.fix.tcl
source scripts/dccwhois.tcl
source scripts/userinfo.tcl
loadhelp userinfo.help
